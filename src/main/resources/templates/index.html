<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WedLux – User Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4A148C 0%, #880E4F 60%, #AD1457 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .hero-container {
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
            line-height: 1.6;
        }
        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        .btn-primary {
            background: #FF4081;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 64, 129, 0.3);
        }
        .btn-primary:hover {
            background: #f50057;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 64, 129, 0.4);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
        }
        .btn-outline:hover {
            background: white;
            color: #880E4F;
            transform: translateY(-3px);
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <div class="logo">💍</div>
        <h1>WedLux Admin</h1>
        <p>Welcome to the Wedding Management System's administrative portal. <br>Manage users, customers, and system settings in one place.</p>
        <div class="actions">
            <a href="/admin/register" class="btn btn-primary">Admin Registration</a>
            <a href="/admin/users" class="btn btn-outline">Admin Dashboard</a>
        </div>
    </div>
</body>
</html>
