<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle} + ' – WMS Admin'">User Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">💍 Wedding Planning System</div>
    <div class="sidebar-section-label">Management</div>
    <a href="/admin/dashboard" class="nav-link">🏠 Dashboard</a>
    <a href="/admin/users"    class="nav-link active">👤 User Management</a>
    <a href="/admin/users/customers" class="nav-link">👥 Customers</a>
    <a href="/admin/vendors"  class="nav-link">🏪 Vendor Management</a>
    <a href="/admin/packages" class="nav-link">📦 Package Management</a>
    <a href="/admin/bookings" class="nav-link">📅 Booking System</a>
    <a href="/admin/reports"  class="nav-link">📊 Report Management</a>
    <div class="sidebar-section-label">Account</div>
    <a href="/admin/profile"  class="nav-link">⚙️ Profile</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-link">🚪 Logout</a></div>
</div>

<div class="main-content">
    <div class="page-header">
        <h1 th:text="${formTitle}">User Form</h1>
        <a href="/admin/users" class="btn btn-outline">← Back to Users</a>
    </div>

    <div class="section-card">
        <div class="form-container">
            <form th:action="${formAction}" th:object="${user}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" th:field="*{fullName}" placeholder="Enter full name">
                    </div>
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" th:field="*{username}" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" th:field="*{email}" placeholder="Enter email address" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" th:field="*{phone}" placeholder="e.g. +94 77 123 4567">
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" th:field="*{password}" placeholder="Enter password">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select th:field="*{role}">
                            <option value="USER">User</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{active}">
                            <option value="true">Active</option>
                            <option value="false">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <a href="/admin/users" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn">💾 Save User</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
