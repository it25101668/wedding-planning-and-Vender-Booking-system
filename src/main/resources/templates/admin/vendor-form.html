<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle} + ' – WMS Admin'">Vendor Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">💍 Wedding Planning System</div>
    <div class="sidebar-section-label">Management</div>
    <a href="/admin/dashboard" class="nav-link">🏠 Dashboard</a>
    <a href="/admin/users"    class="nav-link">👤 User Management</a>
    <a href="/admin/users/customers" class="nav-link">👥 Customers</a>
    <a href="/admin/vendors"  class="nav-link active">🏪 Vendor Management</a>
    <a href="/admin/packages" class="nav-link">📦 Package Management</a>
    <a href="/admin/bookings" class="nav-link">📅 Booking System</a>
    <a href="/admin/reports"  class="nav-link">📊 Report Management</a>
    <div class="sidebar-section-label">Account</div>
    <a href="/admin/profile"  class="nav-link">⚙️ Profile</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-link">🚪 Logout</a></div>
</div>
<div class="main-content">
    <div class="page-header">
        <h1 th:text="${formTitle}">Vendor Form</h1>
        <a href="/admin/vendors" class="btn btn-outline">← Back to Vendors</a>
    </div>
    <div class="section-card">
        <div class="form-container">
            <form th:action="${formAction}" th:object="${vendor}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Vendor Name *</label>
                        <input type="text" th:field="*{name}" placeholder="Business name" required>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select th:field="*{category}" required>
                            <option value="">-- Select Category --</option>
                            <option value="Photography">Photography</option>
                            <option value="Catering">Catering</option>
                            <option value="Florist">Florist</option>
                            <option value="Wedding Hall">Wedding Hall</option>
                            <option value="Music">Music</option>
                            <option value="Decoration">Decoration</option>
                            <option value="Transport">Transport</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" placeholder="vendor@example.com">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" th:field="*{phone}" placeholder="+94 77 xxx xxxx">
                    </div>
                    <div class="form-group">
                        <label>Pricing Tier</label>
                        <select th:field="*{pricingTier}">
                            <option value="Standard">Standard</option>
                            <option value="Premium">Premium</option>
                            <option value="Luxury">Luxury</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{status}">
                            <option value="Active">Active</option>
                            <option value="Pending">Pending</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Address</label>
                        <input type="text" th:field="*{address}" placeholder="Business address">
                    </div>
                    <div class="form-group full-width">
                        <label>Description</label>
                        <textarea th:field="*{description}" placeholder="Brief description of services offered..."></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <a href="/admin/vendors" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn">💾 Save Vendor</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
