<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Registration – Wedding Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            display: block !important;
            height: auto !important;
            overflow: auto !important;
            min-height: 100vh;
            background: linear-gradient(135deg, #4A148C 0%, #880E4F 60%, #AD1457 100%) !important;
        }
        .login-card h2 { text-align: center; animation: titleGlow 2s ease-in-out infinite alternate; }
        .login-card p  { text-align: center; }
        .login-card { max-width: 560px; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card" style="
        max-width: 560px;
        width: 100%;
        border: 3px solid transparent;
        background-clip: padding-box;
        box-shadow:
            0 0 0 3px #AD1457,
            0 0 0 6px #7B1FA2,
            0 0 0 9px rgba(255,64,129,0.2),
            0 30px 70px rgba(0,0,0,0.4);
        border-radius: 16px;
    ">
        <div class="login-logo">📝</div>
        <h2>Admin Registration</h2>
        <p style="margin-bottom:8px;">Your request will be reviewed by the current admin.<br>Once approved, you can log in as an admin.</p>

        <div th:if="${successMsg}" class="alert alert-success" style="margin-top:12px;">
            <span>✅</span><span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" style="margin-top:12px;">
            <span>⚠️</span><span th:text="${errorMsg}"></span>
        </div>

        <form action="/admin/register" method="post" style="margin-top:18px;">

            <div class="form-grid" style="grid-template-columns:1fr 1fr; gap:14px; display:grid; margin-bottom:14px;">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="fullName" placeholder="John Smith" required>
                </div>
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" name="username" placeholder="john_admin" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" placeholder="+94 77 123 4567">
                </div>
            </div>

            <div class="form-group" style="margin-bottom:22px;">
                <label>Password *</label>
                <input type="password" name="password" placeholder="Choose a strong password" required>
            </div>

            <button type="submit" class="btn" style="width:100%; justify-content:center;">📤 Submit Registration Request</button>
        </form>

        <div style="margin-top:18px; text-align:center; font-size:0.88rem; color:#888;">
            Already have an account? <a href="/login" style="color:var(--primary-pink); font-weight:700;">Login here</a>
        </div>
        <div style="margin-top:10px; text-align:center;">
            <a href="/" class="btn btn-outline" style="width:100%; justify-content:center;">🏠 Back to Main Page</a>
        </div>
    </div>
</div>
</body>
</html>
