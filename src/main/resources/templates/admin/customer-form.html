<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Edit Customer – WMS Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">💍 Wedding Planning System</div>
    <div class="sidebar-section-label">Management</div>
    <a href="/admin/dashboard" class="nav-link">🏠 Dashboard</a>
    <a href="/admin/users"    class="nav-link">👤 User Management</a>
    <a href="/admin/users/customers" class="nav-link active">👥 Customers</a>
    <a href="/admin/vendors"  class="nav-link">🏪 Vendor Management</a>
    <a href="/admin/packages" class="nav-link">📦 Package Management</a>
    <a href="/admin/bookings" class="nav-link">📅 Booking System</a>
    <a href="/admin/reports"  class="nav-link">📊 Report Management</a>
    <div class="sidebar-section-label">Account</div>
    <a href="/admin/profile"  class="nav-link">⚙️ Profile</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-link">🚪 Logout</a></div>
</div>

<div class="main-content">
    <div class="page-header">
        <h1 th:text="${formTitle}">Edit Customer</h1>
        <a href="/admin/users/customers" class="btn btn-outline btn-sm">← Back to Customers</a>
    </div>

    <div class="form-container">
        <form th:action="${formAction}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" th:value="${customer.firstName}" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" th:value="${customer.lastName}" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" th:value="${customer.email}" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" th:value="${customer.phone}">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" th:text="${customer.address}"></textarea>
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="password">Change Password (leave blank to keep current)</label>
                    <input type="password" id="password" name="password" placeholder="New Password">
                </div>
            </div>

            <div class="form-actions">
                <a href="/admin/users/customers" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn">Save Customer Details</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
