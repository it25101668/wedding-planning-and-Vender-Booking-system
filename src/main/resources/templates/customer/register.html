<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration – Wedding Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="overflow:auto;">
<div class="login-wrapper" style="padding:30px;">
    <div class="login-card" style="max-width:560px;">
        <div class="login-logo">💒</div>
        <h2>Create Account</h2>
        <p>Register to plan your perfect wedding</p>

        <div th:if="${errorMsg}"   class="alert alert-danger"><span>⚠️</span><span th:text="${errorMsg}"></span></div>
        <div th:if="${successMsg}" class="alert alert-success"><span>✅</span><span th:text="${successMsg}"></span></div>

        <form action="/customer/register" method="post" th:object="${customer}">
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="firstName" placeholder="Jane" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="lastName" placeholder="Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" placeholder="jane@email.com" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" placeholder="+94 77 xxx xxxx">
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <div style="position:relative;">
                        <input type="password" id="regPassword" name="password" placeholder="Create a password" required
                               style="width:100%; padding-right:44px;"
                               oninput="checkPasswordStrength(this.value)">
                        <button type="button" onclick="togglePassVis()" tabindex="-1"
                                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#aaa;" title="Show/Hide password">
                            <span id="passEye">👁️</span>
                        </button>
                    </div>
                    <!-- Password strength bar -->
                    <div id="strengthBarWrap" style="margin-top:8px; display:none;">
                        <div style="height:6px; border-radius:4px; background:#e8e0ee; overflow:hidden;">
                            <div id="strengthBar" style="height:100%; width:0%; border-radius:4px; transition:width 0.35s, background 0.35s;"></div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                            <span id="strengthLabel" style="font-size:0.78rem; font-weight:600; letter-spacing:0.03em;"></span>
                            <span id="strengthTips" style="font-size:0.72rem; color:#aaa;"></span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" placeholder="Your address">
                </div>
            </div>
            <div class="form-actions" style="flex-direction:column; align-items:center; gap:10px; margin-top:24px;">
                <button type="submit" class="btn" style="min-width:200px; justify-content:center;">💒 Register</button>
                <a href="/" class="btn btn-secondary" style="min-width:200px; justify-content:center; text-decoration:none;">← Back to Home</a>
            </div>
        </form>
        <div style="margin-top:18px; text-align:center; font-size:0.82rem; color:#888;">
            Already have an account? <a th:href="@{/customer/login}" style="color:var(--primary-pink); font-weight:600;">Login</a>
        </div>
    </div>
</div>
<script>
    function checkPasswordStrength(pwd) {
        const wrap  = document.getElementById('strengthBarWrap');
        const bar   = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        const tips  = document.getElementById('strengthTips');

        if (!pwd) { wrap.style.display = 'none'; return; }
        wrap.style.display = 'block';

        let score = 0;
        const missing = [];
        if (pwd.length >= 8)             score++; else missing.push('8+ chars');
        if (/[A-Z]/.test(pwd))           score++; else missing.push('uppercase');
        if (/[a-z]/.test(pwd))           score++; else missing.push('lowercase');
        if (/[0-9]/.test(pwd))           score++; else missing.push('number');
        if (/[^A-Za-z0-9]/.test(pwd))    score++; else missing.push('symbol');

        const levels = [
            { pct:'20%', bg:'#e74c3c', text:'Weak',       color:'#e74c3c' },
            { pct:'40%', bg:'#e67e22', text:'Fair',        color:'#e67e22' },
            { pct:'60%', bg:'#f1c40f', text:'Good',        color:'#c0971e' },
            { pct:'80%', bg:'#2ecc71', text:'Strong',      color:'#27ae60' },
            { pct:'100%',bg:'#1abc9c', text:'Very Strong', color:'#16a085' },
        ];

        const lvl = levels[score - 1] || levels[0];
        bar.style.width      = lvl.pct;
        bar.style.background = lvl.bg;
        label.textContent    = lvl.text;
        label.style.color    = lvl.color;
        tips.textContent     = missing.length ? 'Add: ' + missing.join(', ') : '✔ Great password!';
    }

    function togglePassVis() {
        const inp = document.getElementById('regPassword');
        const eye = document.getElementById('passEye');
        if (inp.type === 'password') { inp.type = 'text';     eye.textContent = '🙈'; }
        else                         { inp.type = 'password'; eye.textContent = '👁️'; }
    }
</script>
</body>
</html>
